<!DOCTYPE html>
<html>

<head>
  <meta charset='utf-8'>
  <meta http-equiv='X-UA-Compatible' content='IE=edge'>
  <title>Page Title</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
</head>

<body>
  <div id="content"></div>
</body>

</html>
<script src="./meilisearch.umd.min.js"></script>
<script>
  ; (async () => {
    // @TODO The imported script is a hard link, shouldn't have such things in git
    //       https://stackoverflow.com/a/3731139 ; was incredibly confusing until I found out what it actually is
    const client = new MeiliSearch({ host: "http://localhost:7700", apiKey: "masterKey" })
    const UID = "headers"
    const errorDiv = document.createElement("div");
    errorDiv.setAttribute("id", "error");

    let error = 'NO ERRORS'
    try {
      const task = await client.createIndex(UID)
      await client.waitForTask(task.taskUid)
      await fetch(`http://localhost:7700/indexes/${UID}/documents`, {
        method: 'POST',
        headers: {
          Authorization: `Bearer masterKey`,
          'User-Agent': 'plif plouf',
          "wrong-header": "wrong header"
        },
        body: []
      })
    } catch (e) {
      error = e.message
    }

    errorDiv.innerHTML = error
    document.body.insertBefore(errorDiv, document.querySelector("#content"));

    const deleteTask = await client.index(UID).delete()
    await client.waitForTask(deleteTask.taskUid)
  })()


</script>
